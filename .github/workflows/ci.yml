name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Flutter & Dart version
        run: |
          flutter --version
          dart --version

      - name: Install dependencies
        run: flutter pub get

      - name: Show package_config state
        run: |
          echo "=== flutter_gen in package_config ==="
          python3 -c "import json; d=json.load(open('.dart_tool/package_config.json')); matches=[p for p in d['packages'] if 'flutter_gen' in p['name']]; print('flutter_gen count:', len(matches)); [print(p) for p in matches]"
          echo "=== .dart_tool/flutter_gen dir ==="
          ls .dart_tool/flutter_gen/ 2>/dev/null && echo "EXISTS" || echo "NOT EXISTS"
          echo "=== lib/core/l10n/generated ==="
          ls lib/core/l10n/generated/ 2>/dev/null || echo "NOT EXISTS"

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run analyzer
        run: |
          dart analyze --fatal-infos lib/ test/ 2>&1 | tee analyze_output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload analyze output always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analyze-output
          path: analyze_output.txt

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
        continue-on-error: true

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Web
        run: flutter build web --release
