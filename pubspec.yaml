name: lumo_learn
description: "Your AI English habit, in 5 minutes a day."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Backend
  supabase_flutter: ^2.5.0

  # Auth
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.2

  # Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # AI & Network
  http: ^1.2.2

  # Data models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # TTS
  flutter_tts: ^4.0.2

  # Subscriptions
  purchases_flutter: ^6.29.0

  # Push notifications
  firebase_core: ^3.4.1
  firebase_messaging: ^15.1.3

  # Share & screenshot
  share_plus: ^10.0.2
  screenshot: ^3.0.0

  # Animations
  lottie: ^3.1.2

  # UI
  google_fonts: ^6.2.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.4.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.3.13

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

  fonts:
    - family: Playfair
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
